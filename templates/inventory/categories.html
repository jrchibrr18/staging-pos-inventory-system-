{% extends "base.html" %}
{% block title %}Categories - {{ pos_name }}{% endblock %}
{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0 fw-bold"><i class="bi bi-tags me-2"></i>Categories</h1>
        <a href="{{ url_for('inventory.category_new') }}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Category</a>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr><th>Name</th><th>Description</th><th></th></tr>
                </thead>
                <tbody>
                    {% for c in categories %}
                    <tr>
                        <td>{{ c.name }}</td>
                        <td>{{ c.description or '-' }}</td>
                        <td><a href="{{ url_for('inventory.category_edit', id=c.id) }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="3" class="text-center text-muted">No categories</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
