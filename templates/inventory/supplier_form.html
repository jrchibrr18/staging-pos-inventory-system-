{% extends "base.html" %}
{% block title %}{{ 'Edit' if supplier else 'New' }} Supplier{% endblock %}
{% block content %}
<div class="container">
    <h1 class="h3 mb-4 fw-bold"><i class="bi bi-truck me-2"></i>{{ 'Edit' if supplier else 'New' }} Supplier</h1>
    <div class="card border-0 shadow-sm" style="max-width: 500px;">
        <div class="card-body">
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ supplier.name if supplier else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contact Person</label>
                    <input type="text" name="contact_person" class="form-control" value="{{ supplier.contact_person if supplier else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ supplier.phone if supplier else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ supplier.email if supplier else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2">{{ supplier.address if supplier else '' }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{{ url_for('inventory.suppliers') }}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
