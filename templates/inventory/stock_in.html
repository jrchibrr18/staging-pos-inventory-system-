{% extends "base.html" %}
{% block title %}Stock In - {{ product.name }}{% endblock %}
{% block content %}
<div class="container">
    <h1 class="h3 mb-4 fw-bold"><i class="bi bi-plus-circle me-2"></i>Stock In - {{ product.name }}</h1>
    <div class="card border-0 shadow-sm" style="max-width: 400px;">
        <div class="card-body">
            <p class="text-muted">Current stock: <strong>{{ product.quantity }} {{ product.unit }}</strong></p>
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Quantity to add *</label>
                    <input type="number" name="quantity" class="form-control" min="1" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="2" placeholder="Optional"></textarea>
                </div>
                <button type="submit" class="btn btn-success"><i class="bi bi-plus-lg me-1"></i>Add Stock</button>
                <a href="{{ url_for('inventory.products') }}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
