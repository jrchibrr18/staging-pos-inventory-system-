{% extends "base.html" %}
{% block title %}{{ 'Edit' if category else 'New' }} Category{% endblock %}
{% block content %}
<div class="container">
    <h1 class="h3 mb-4 fw-bold"><i class="bi bi-tags me-2"></i>{{ 'Edit' if category else 'New' }} Category</h1>
    <div class="card border-0 shadow-sm" style="max-width: 500px;">
        <div class="card-body">
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ category.name if category else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" name="description" class="form-control" value="{{ category.description if category else '' }}">
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{{ url_for('inventory.categories') }}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
