{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'New' }} Product - {{ pos_name }}{% endblock %}
{% block content %}
<div class="container">
    <h1 class="h3 mb-4 fw-bold"><i class="bi bi-box me-2"></i>{{ 'Edit' if product else 'New' }} Product</h1>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Name *</label>
                        <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">SKU</label>
                        <input type="text" name="sku" class="form-control" value="{{ product.sku if product else '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Barcode</label>
                        <input type="text" name="barcode" class="form-control" value="{{ product.barcode if product else '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Category</label>
                        <select name="category_id" class="form-select">
                            <option value="">-- Select --</option>
                            {% for c in categories %}
                            <option value="{{ c.id }}" {% if product and product.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Supplier</label>
                        <select name="supplier_id" class="form-select">
                            <option value="">-- Select --</option>
                            {% for s in suppliers %}
                            <option value="{{ s.id }}" {% if product and product.supplier_id == s.id %}selected{% endif %}>{{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Selling Price *</label>
                        <input type="number" name="selling_price" class="form-control" step="0.01" value="{{ product.selling_price if product else '0' }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Cost Price</label>
                        <input type="number" name="cost_price" class="form-control" step="0.01" value="{{ product.cost_price if product else '0' }}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-control" value="{{ product.quantity if product else '0' }}" {% if product %}readonly{% endif %}>
                        {% if product %}<small class="text-muted">Use Stock In/Out</small>{% endif %}
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Unit</label>
                        <select name="unit" class="form-select">
                            <option value="pcs" {% if product and product.unit == 'pcs' %}selected{% endif %}>pcs</option>
                            <option value="box" {% if product and product.unit == 'box' %}selected{% endif %}>box</option>
                            <option value="kg" {% if product and product.unit == 'kg' %}selected{% endif %}>kg</option>
                            <option value="sachet" {% if product and product.unit == 'sachet' %}selected{% endif %}>sachet</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Min Stock</label>
                        <input type="number" name="min_stock" class="form-control" value="{{ product.min_stock if product else '5' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Expiry Date</label>
                        <input type="date" name="expiry_date" class="form-control" value="{{ product.expiry_date if product and product.expiry_date else '' }}">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a href="{{ url_for('inventory.products') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
